<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>灵壳 SpiritShell · 对话</title>
  <style>
    :root {
      --bg: #0c4a6e;
      --bg-soft: #f0f9ff;
      --card: #fff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0369a1;
      --accent-hover: #075985;
      --user: #e0f2fe;
      --assistant: #f8fafc;
      --border: #e2e8f0;
      --radius: 14px;
      --font: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: linear-gradient(165deg, var(--bg) 0%, #075985 45%, var(--bg-soft) 45%);
      color: var(--text);
    }
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      color: #fff;
      padding: 1rem 0 1.5rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 0.35rem 0 0;
      font-size: 0.85rem;
      opacity: 0.85;
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
      border: 1px solid var(--border);
      overflow: hidden;
      min-height: 420px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 0.65rem 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }
    .meta label { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
    .meta output { font-variant-numeric: tabular-nums; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .bubble {
      max-width: 92%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user);
      border: 1px solid #bae6fd;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--border);
    }
    .bubble.error {
      align-self: stretch;
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }
    .composer {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      background: #fafafa;
    }
    .composer textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
      line-height: 1.45;
    }
    .composer textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.15);
    }
    button.send {
      align-self: flex-end;
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      transition: background 0.15s ease;
    }
    button.send:hover:not(:disabled) { background: var(--accent-hover); }
    button.send:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 1rem;
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>灵壳 SpiritShell</h1>
      <p>经本机后端 · Ollama 模型 · 可选 MemPalace 记忆</p>
    </header>
    <div class="panel">
      <div class="meta">
        <label><input type="checkbox" id="useMemory" checked /> 使用记忆检索</label>
        <span>状态：<output id="health">…</output></span>
      </div>
      <div id="messages" aria-live="polite"></div>
      <div class="composer">
        <textarea id="input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行" autofocus></textarea>
        <button type="button" class="send" id="send">发送</button>
      </div>
    </div>
    <footer>
      API：<code>/v1/chat</code> · <a href="/docs">OpenAPI</a>
    </footer>
  </div>
  <script>
    const messagesEl = document.getElementById("messages");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const useMemory = document.getElementById("useMemory");
    const healthOut = document.getElementById("health");

    /** @type {{role: string, content: string}[]} */
    let history = [];

    async function pingHealth() {
      try {
        const r = await fetch("/health");
        const j = await r.json();
        healthOut.textContent = j.ok ? `OK · ${j.model}` : "异常";
      } catch {
        healthOut.textContent = "无法连接后端";
      }
    }

    function appendBubble(role, text, className) {
      const div = document.createElement("div");
      div.className = "bubble " + (className || role);
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    /** FastAPI HTTPException / validation 的 detail 可能是 string、{error} 或数组 */
    function formatApiError(data) {
      const d = data && data.detail;
      if (d == null) return JSON.stringify(data || {});
      if (typeof d === "string") return d;
      if (typeof d.error === "string") return d.error;
      if (Array.isArray(d))
        return d.map((x) => (x.msg ? x.msg : JSON.stringify(x))).join("；");
      return JSON.stringify(d);
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      sendBtn.disabled = true;
      appendBubble("user", text);

      const payload = {
        messages: [...history, { role: "user", content: text }],
        use_memory: useMemory.checked,
      };

      const loadingEl = appendBubble("assistant", "正在生成…（首次调用模型可能需几十秒）", "assistant");

      try {
        const res = await fetch("/v1/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const raw = await res.text();
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch {
          loadingEl.remove();
          appendBubble("assistant", "响应不是合法 JSON：" + raw.slice(0, 200), "error");
          return;
        }

        loadingEl.remove();

        if (!res.ok) {
          appendBubble("assistant", "请求失败：" + formatApiError(data), "error");
          return;
        }

        const reply = data.reply != null ? String(data.reply) : "";
        if (!reply.trim()) {
          appendBubble(
            "assistant",
            "模型返回了空内容。请在本机执行 `ollama list` 确认 OPENAI_MODEL 与之一致，并已 `ollama pull <模型名>`。也可看终端里 uvicorn 的报错。",
            "error"
          );
          return;
        }

        history.push({ role: "user", content: text });
        history.push({ role: "assistant", content: reply });
        appendBubble("assistant", reply);

        const mem = data.memory_injected ? "已注入" : "未命中";
        healthOut.textContent = `OK · 记忆 ${mem} (${data.memory_status})`;
      } catch (e) {
        loadingEl.remove();
        appendBubble("assistant", "网络错误：" + (e && e.message ? e.message : String(e)), "error");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    pingHealth();
    setInterval(pingHealth, 30000);
  </script>
</body>
</html>
